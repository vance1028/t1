services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tunnel
      POSTGRES_USER: tunnel
      POSTGRES_PASSWORD: tunnel123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunnel -d tunnel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://tunnel:tunnel123@db:5432/tunnel
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/init.sql:/app/init.sql

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "7293:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
